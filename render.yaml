services:
  - type: web
    name: bts-website
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn bts_pc_website.wsgi:application --log-file -
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: your-app.onrender.com,yourdomain.com,www.yourdomain.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://your-app.onrender.com,https://yourdomain.com,https://www.yourdomain.com
      - key: DATABASE_URL
        fromDatabase:
          name: bts-website-db
          property: connectionString

databases:
  - name: bts-website-db
    plan: free
